{% extends "model-page.html" %}

{% block content %}
<h2 class="page-title">Histórico de Eventos</h2>

<div class="actions-row">
    <a href="../" class="btn pastel-gray">Voltar</a>
</div>

<ul class="event-list">
    {% for evento in eventos %}
    <li class="event-item">
        {{ evento.titulo }} — {{ evento.get_data_evento }}
    </li>
    {% endfor %}
</ul>

{% endblock %}
