{% extends "model-page.html" %}

{% block content %}
<h2 class="page-title">Agendamentos</h2>

<div class="actions-row">
    <a href="evento/" class="btn pastel-blue">Novo Evento</a>
    <a href="historico/" class="btn pastel-purple">Histórico</a>
</div>

<ul class="event-list">
    {% for evento in eventos %}
    <li class="event-item 
        {% if evento.get_evento_atrasado %} 
            event-late
        {% elif evento.get_evento_vencendo %} 
            event-warning 
        {% endif %}
    ">
        <span>{{ evento.titulo }} – {{ evento.get_data_evento }}</span>

        <span class="event-actions">
            <a href="evento/?id={{ evento.id }}" class="link-edit">Editar</a>
            <span>/</span>
            <a href="evento/delete/{{ evento.id }}/" class="link-delete">Excluir</a>
        </span>
    </li>
    {% endfor %}
</ul>

{% endblock %}
